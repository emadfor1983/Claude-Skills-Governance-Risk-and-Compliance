theme: jekyll-theme-cayman

title: Claude Skills for GRC
description: >
  Expert-level compliance guidance for ISO 27001, SOC 2, FedRAMP, GDPR,
  and HIPAA — powered by Claude Skills.

# So Jekyll doesn't try to process the skill folders as collections
exclude:
  - "FedRamp - Claude Skill"
  - "GDPR - Claude Skill "
  - "HIPAA - Claude Skill"
  - "ISO 27001 - Claude Skill"
  - "SOC 2 - Claude Skill"
  - "*.skill"

# Keep the eval HTML and images as static passthrough files
include:
  - "grc-skills-eval-results.html"
  - "Installing Skills in Claude.png"
